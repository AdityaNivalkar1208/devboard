<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBoard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6d28d9,#9333ea,#c084fc);
    color:#fff;
}

.container{
    text-align:center;
    padding:2rem;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

p{
    font-size:1.1rem;
    opacity:.9;
    margin-bottom:25px;
}

button{
    border:none;
    padding:12px 28px;
    border-radius:30px;
    background:#fff;
    color:#6d28d9;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
}
</style>
</head>
<body>

<div class="container">
    <h1>DevBoard</h1>
    <p>Track tasks, manage sprints, ship faster.</p>
    <button>Get Started</button>
</div>

</body>
</html>
